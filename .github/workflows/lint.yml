name: golangci
on:
  merge_group:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]


jobs:

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: "go.mod"

    - name: Run linter
      uses: golangci/golangci-lint-action@v9
      with:
        version: 'v2.10'
        cache-invalidation-interval: 7

