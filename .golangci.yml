version: "2"

linters:
  enable:
    - govet
    - gosec
    - revive
    - unused
    - nilnil
    - modernize
    - asciicheck
    - errcheck
    - ineffassign
    - staticcheck
    - wastedassign
    - misspell
    - contextcheck
    - dupl
    - err113
    - errname
    - errorlint
    - exptostd

  settings:
    modernize:
      disable:
        - any
    revive:
      rules:
        - name: package-comments
          disabled: true


formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - golines
    - goimports

  settings:

    gci:
      sections:
        - standard # standard library
        - default # Third-party libraries
        - localmodule # Local modules
      custom-order: true
    goimports:
      local-prefixes:
        - github.com/opdev/virtwork

    golines:
      # Default: 100
      max-len: 120
